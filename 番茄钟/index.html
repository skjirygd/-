<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>番茄钟 - 高效时间管理</title>
    
    <!-- TDesign CSS -->
    <link rel="stylesheet" href="https://unpkg.com/tdesign-react@1.12.0/dist/tdesign.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #ff9a56 0%, #ff6b35 50%, #ff4e00 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* 主计时器卡片 */
        .timer-card {
            background: white;
            border-radius: 24px;
            padding: 60px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .timer-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 154, 86, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .timer-header {
            position: relative;
            z-index: 1;
            margin-bottom: 40px;
        }

        .timer-header h1 {
            font-size: 42px;
            font-weight: 700;
            background: linear-gradient(120deg, #ff6b35, #ff9a56, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }

        .timer-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: linear-gradient(90deg, #ff9a56, #ffd700);
            color: white;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }

        /* 圆形进度条 */
        .timer-display {
            position: relative;
            z-index: 1;
            width: 320px;
            height: 320px;
            margin: 0 auto 40px;
        }

        .circle-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .circle-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #fff5e6 0%, #ffe0b3 100%);
            box-shadow: 
                0 0 0 12px rgba(255, 154, 86, 0.1),
                0 0 0 24px rgba(255, 154, 86, 0.05),
                inset 0 4px 20px rgba(255, 107, 53, 0.1);
        }

        .circle-progress {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .progress-ring {
            fill: none;
            stroke: url(#gradient);
            stroke-width: 12;
            stroke-linecap: round;
            stroke-dasharray: 942;
            stroke-dashoffset: 942;
            filter: drop-shadow(0 2px 8px rgba(255, 107, 53, 0.4));
            transition: stroke-dashoffset 0.5s linear;
        }

        .timer-time {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .time-display {
            font-size: 72px;
            font-weight: 700;
            color: #ff6b35;
            line-height: 1;
            margin-bottom: 12px;
            text-shadow: 0 2px 10px rgba(255, 107, 53, 0.2);
        }

        .time-label {
            font-size: 18px;
            color: #ff9a56;
            font-weight: 600;
        }

        /* 控制按钮 */
        .timer-controls {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 24px;
            position: relative;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b35 0%, #ff4e00 100%);
            color: white;
            box-shadow: 0 8px 24px rgba(255, 107, 53, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(255, 107, 53, 0.5);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #ff6b35;
            box-shadow: 0 8px 24px rgba(255, 215, 0, 0.3);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(255, 215, 0, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%);
            color: white;
            box-shadow: 0 8px 24px rgba(255, 68, 68, 0.3);
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(255, 68, 68, 0.4);
        }

        /* 统计信息 */
        .timer-stats {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            gap: 40px;
            padding-top: 30px;
            border-top: 2px solid rgba(255, 154, 86, 0.2);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #ff6b35;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 14px;
            color: #999;
            font-weight: 500;
        }

        /* 任务列表 */
        .task-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .task-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .task-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .task-title {
            font-size: 20px;
            font-weight: 700;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .task-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .icon-orange {
            background: linear-gradient(135deg, #ff9a56, #ff6b35);
            color: white;
        }

        .icon-yellow {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #ff6b35;
        }

        .task-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            background: linear-gradient(90deg, rgba(255, 154, 86, 0.1), rgba(255, 215, 0, 0.1));
            color: #ff6b35;
        }

        .add-task-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #ff6b35, #ff9a56);
            color: white;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
        }

        .add-task-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 16px rgba(255, 107, 53, 0.4);
        }

        .add-task-btn:active {
            transform: scale(0.95);
        }

        .task-header-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: linear-gradient(135deg, #fff8f0 0%, #ffffff 100%);
            border-radius: 12px;
            border-left: 4px solid;
            transition: all 0.3s ease;
        }

        .task-item:hover {
            transform: translateX(4px);
            box-shadow: 0 4px 12px rgba(255, 154, 86, 0.15);
        }

        .task-item:nth-child(1) { border-left-color: #ff6b35; }
        .task-item:nth-child(2) { border-left-color: #ff9a56; }
        .task-item:nth-child(3) { border-left-color: #ffd700; }
        .task-item:nth-child(4) { border-left-color: #ffed4e; }

        .task-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #ff9a56;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .task-checkbox:hover {
            border-color: #ff6b35;
            transform: scale(1.1);
        }

        .task-checkbox.checked {
            background: linear-gradient(135deg, #ff6b35, #ff9a56);
            border-color: #ff6b35;
        }

        .task-checkbox.checked::after {
            content: '✓';
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .task-item.completed .task-name {
            text-decoration: line-through;
            opacity: 0.6;
        }

        .task-content {
            flex: 1;
        }

        .task-name {
            font-size: 15px;
            font-weight: 500;
            color: #333;
            margin-bottom: 4px;
        }

        .task-time {
            font-size: 12px;
            color: #999;
        }

        .task-priority {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .task-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .task-edit-btn {
            width: 28px;
            height: 28px;
            border: none;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #ff6b35;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            flex-shrink: 0;
        }

        .task-edit-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.3);
        }

        .priority-high { background: #ff4444; color: white; }
        .priority-medium { background: #ffd700; color: #ff6b35; }
        .priority-low { background: #e0e0e0; color: #666; }

        /* 成就卡片 */
        .achievement-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .achievement-icon-large {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b35, #ffd700);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: white;
            box-shadow: 0 8px 24px rgba(255, 107, 53, 0.3);
            flex-shrink: 0;
        }

        .achievement-content {
            flex: 1;
        }

        .achievement-title {
            font-size: 18px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }

        .achievement-desc {
            font-size: 16px;
            color: #333;
            line-height: 1.6;
            font-weight: 600;
            text-align: center;
        }

        .achievement-progress {
            margin-top: 12px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b35, #ffd700);
            border-radius: 4px;
            width: 75%;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 12px;
            color: #999;
            margin-top: 6px;
        }

        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(120deg, #ff6b35, #ff9a56);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: #f0f0f0;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: #ff6b35;
            color: white;
            transform: rotate(90deg);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #ff9a56;
            box-shadow: 0 0 0 4px rgba(255, 154, 86, 0.1);
        }

        .form-select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .form-select:focus {
            outline: none;
            border-color: #ff9a56;
            box-shadow: 0 0 0 4px rgba(255, 154, 86, 0.1);
        }

        .form-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-cancel {
            background: #f0f0f0;
            color: #666;
        }

        .btn-cancel:hover {
            background: #e0e0e0;
        }

        .btn-submit {
            background: linear-gradient(135deg, #ff6b35, #ff9a56);
            color: white;
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
        }

        .btn-submit:hover {
            box-shadow: 0 6px 16px rgba(255, 107, 53, 0.4);
            transform: translateY(-2px);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* 成就通知 */
        .achievement-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border-radius: 16px;
            padding: 20px 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 2000;
            animation: slideInRight 0.5s ease, fadeOut 0.5s ease 4.5s;
            min-width: 320px;
            border-left: 4px solid;
            border-image: linear-gradient(135deg, #ff6b35, #ffd700) 1;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateX(400px);
            }
        }

        .achievement-notification-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b35, #ffd700);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            flex-shrink: 0;
            animation: rotate360 1s ease;
        }

        @keyframes rotate360 {
            from { transform: rotate(0deg) scale(0); }
            50% { transform: rotate(180deg) scale(1.2); }
            to { transform: rotate(360deg) scale(1); }
        }

        .achievement-notification-content {
            flex: 1;
        }

        .achievement-notification-title {
            font-size: 16px;
            font-weight: 700;
            color: #ff6b35;
            margin-bottom: 4px;
        }

        .achievement-notification-desc {
            font-size: 14px;
            color: #666;
        }

        /* 成就列表样式 */
        .achievement-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .view-all-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, #ff6b35, #ff9a56);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
        }

        .view-all-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 107, 53, 0.4);
        }

        /* 本周成就 - 精简显示 */
        .weekly-achievements-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
        }

        .weekly-achievement-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: linear-gradient(135deg, #fff8f0 0%, #ffffff 100%);
            border-radius: 20px;
            border: 2px solid #ffd700;
            box-shadow: 0 2px 8px rgba(255, 215, 0, 0.3);
            transition: all 0.3s ease;
        }

        .weekly-achievement-badge:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.4);
        }

        .weekly-achievement-icon {
            font-size: 24px;
            line-height: 1;
        }

        .weekly-achievement-name {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .no-achievements-text {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 14px;
        }

        /* 全部成就模态框 */
        .all-achievements-modal .modal-content {
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .achievement-grid-full {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .achievement-card-full {
            background: linear-gradient(135deg, #fff8f0 0%, #ffffff 100%);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .achievement-card-full.unlocked {
            border-color: #ffd700;
            box-shadow: 0 4px 16px rgba(255, 215, 0, 0.3);
        }

        .achievement-card-full.locked {
            opacity: 0.6;
            filter: grayscale(70%);
        }

        .achievement-card-full:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(255, 107, 53, 0.2);
        }

        .achievement-card-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e0e0e0, #f0f0f0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 0 16px 0;
        }

        .achievement-card-full.unlocked .achievement-card-icon {
            background: linear-gradient(135deg, #ff6b35, #ffd700);
        }

        .achievement-card-name {
            font-size: 16px;
            font-weight: 700;
            color: #333;
            margin: 0 0 8px 0;
            min-height: 24px;
        }

        .achievement-card-desc {
            font-size: 13px;
            color: #666;
            line-height: 1.5;
            min-height: 40px;
            margin-bottom: 12px;
        }

        .achievement-card-progress {
            margin: 0 0 8px 0;
            font-size: 12px;
            color: #ff9a56;
            font-weight: 600;
        }

        .achievement-card-status {
            display: inline-block;
            margin: 0;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .achievement-card-full.unlocked .achievement-card-status {
            background: linear-gradient(90deg, #ffd700, #ffed4e);

            {

                icon: '🏆',
                requirement: 1,
                type: 'weekly',
                unlocked: false,
                unlockedDate: null,
                count: 0
            }
        ];

        let achievementStats = {
            totalPomodoros: 0,
            completedTasks: 0,
            completedRestTasks: 0,
            totalMinutes: 0,
            lastActiveDate: null,
            streakDays: 0,
            weeklyStats: {
                pomodoros: 0,
                tasks: 0,
                restTasks: 0,
                weekStart: null
            }
        };

        // 配置
        const CONFIG = {
            focusTime: 25 * 60, // 25分钟
            breakTime: 5 * 60,  // 5分钟
            longBreakTime: 15 * 60 // 15分钟
        };

        // 初始化
        function init() {
            loadStats();
            loadTasks();
            loadAchievements();
            updateDisplay();
            updateProgressRing();
            renderTasks();
            renderAchievements();
            updateAchievementSummary();
        }

        // 加载任务列表
        function loadTasks() {
            const saved = localStorage.getItem('pomodoroTasks');
            if (saved) {
                const data = JSON.parse(saved);
                tasks = data.tasks || { work: [], break: [] };
                taskIdCounter = data.taskIdCounter || 1;
                
                // 检查是否需要清理任务
                cleanupOldTasks();
            } else {
                // 默认任务
                const today = new Date().toDateString();
                tasks.work = [
                    { id: taskIdCounter++, name: '完成项目文档编写', desc: '09:00 - 11:00', priority: 'high', completed: false, createdAt: today },
                    { id: taskIdCounter++, name: '代码审查与优化', desc: '11:00 - 12:30', priority: 'high', completed: false, createdAt: today },
                    { id: taskIdCounter++, name: '团队会议准备', desc: '14:00 - 15:30', priority: 'medium', completed: false, createdAt: today }
                ];
                tasks.break = [
                    { id: taskIdCounter++, name: '喝一杯温水', desc: '保持身体水分充足', priority: 'medium', completed: false, createdAt: today },
                    { id: taskIdCounter++, name: '眺望远方放松眼睛', desc: '缓解视觉疲劳', priority: 'medium', completed: false, createdAt: today },
                    { id: taskIdCounter++, name: '站起来活动一下', desc: '舒展身体，促进血液循环', priority: 'low', completed: false, createdAt: today }
                ];
                saveTasks();
            }
        }

        // 清理旧任务
        function cleanupOldTasks() {
            const today = new Date().toDateString();
            
            // 清理工作任务
            tasks.work = tasks.work.filter(task => {
                // 确保任务有创建日期
                if (!task.createdAt) {
                    task.createdAt = today;
                }
                // 确保任务有排序值
                if (!task.sortOrder) {
                    task.sortOrder = Date.now();
                }
                // 保留未完成的任务，删除已完成且不是今天创建的任务
                return !task.completed || task.createdAt === today;
            });
            
            // 清理休息任务
            tasks.break = tasks.break.filter(task => {
                // 确保任务有创建日期
                if (!task.createdAt) {
                    task.createdAt = today;
                }
                // 确保任务有排序值
                if (!task.sortOrder) {
                    task.sortOrder = Date.now();
                }
                // 保留未完成的任务，删除已完成且不是今天创建的任务
                return !task.completed || task.createdAt === today;
            });
            
            // 排序任务
            sortTasks('work');
            sortTasks('break');
            saveTasks();
        }

        // 排序任务
        function sortTasks(type) {
            tasks[type].sort((a, b) => {
                // 首先按优先级排序（高优先级在前）
                const priorityOrder = { high: 0, medium: 1, low: 2 };
                const priorityDiff = priorityOrder[a.priority] - priorityOrder[b.priority];
                if (priorityDiff !== 0) {
                    return priorityDiff;
                }
                
                // 优先级相同，按sortOrder排序（手动排序优先）
                if (a.sortOrder && b.sortOrder) {
                    return a.sortOrder - b.sortOrder;
                }
                
                // 如果没有sortOrder，按创建时间排序
                return new Date(a.createdAt) - new Date(b.createdAt);
            });
        }

        // 保存任务列表
        function saveTasks() {
            const data = {
                tasks: tasks,
                taskIdCounter: taskIdCounter
            };
            localStorage.setItem('pomodoroTasks', JSON.stringify(data));
        }

        // 加载成就数据
        function loadAchievements() {
            const saved = localStorage.getItem('pomodoroAchievements');
            if (saved) {
                const data = JSON.parse(saved);
                // 合并已保存的解锁状态、解锁日期和计数
                achievements.forEach(achievement => {
                    const savedAch = data.find(a => a.id === achievement.id);
                    if (savedAch) {
                        achievement.unlocked = savedAch.unlocked;
                        achievement.unlockedDate = savedAch.unlockedDate;
                        achievement.count = savedAch.count || 0;
                    }
                });
            }
            
            const savedStats = localStorage.getItem('pomodoroAchievementStats');
            if (savedStats) {
                achievementStats = JSON.parse(savedStats);
                // 确保weeklyStats存在
                if (!achievementStats.weeklyStats) {
                    achievementStats.weeklyStats = {
                        pomodoros: 0,
                        tasks: 0,
                        restTasks: 0,
                        weekStart: null
                    };
                }
            }
            
            // 检查是否需要更新周统计
            checkWeeklyStats();
        }

        // 检查周统计是否需要更新
        function checkWeeklyStats() {
            const now = new Date();
            const dayOfWeek = now.getDay() || 7; // 周日为0，转为7
            const weekStart = new Date(now);
            weekStart.setDate(now.getDate() - dayOfWeek + 1);
            weekStart.setHours(0, 0, 0, 0);
            const weekStartStr = weekStart.toDateString();
            
            if (!achievementStats.weeklyStats.weekStart || achievementStats.weeklyStats.weekStart !== weekStartStr) {
                // 新的一周，重置周统计
                achievementStats.weeklyStats = {
                    pomodoros: 0,
                    tasks: 0,
                    restTasks: 0,
                    weekStart: weekStartStr
                };
                saveAchievements();
            }
        }

        // 保存成就数据
        function saveAchievements() {
            localStorage.setItem('pomodoroAchievements', JSON.stringify(achievements));
            localStorage.setItem('pomodoroAchievementStats', JSON.stringify(achievementStats));
        }

        // 渲染本周成就（仅显示已解锁且在本周内解锁的）
        function renderAchievements() {
            const container = document.getElementById('weeklyAchievements');
            const summary = document.getElementById('achievementSummary');
            
            // 获取本周开始时间（周一00:00）
            const now = new Date();
            const dayOfWeek = now.getDay() || 7; // 周日为0，转为7
            const weekStart = new Date(now);
            weekStart.setDate(now.getDate() - dayOfWeek + 1);
            weekStart.setHours(0, 0, 0, 0);
            
            // 筛选本周解锁的成就
            const weeklyUnlocked = achievements.filter(a => {
                if (!a.unlocked || !a.unlockedDate) return false;
                const unlockedDate = new Date(a.unlockedDate);
                return unlockedDate >= weekStart;
            });
            
            // 更新统计
            const totalUnlocked = achievements.filter(a => a.unlocked).length;
            summary.textContent = `本周已获得：${weeklyUnlocked.length} 个成就 | 累计总获得：${totalUnlocked} 个成就`;
            
            // 渲染本周成就
            if (weeklyUnlocked.length === 0) {
                container.innerHTML = '<div class="no-achievements-text">本周暂无新成就，继续加油！</div>';
            } else {
                container.innerHTML = weeklyUnlocked.map(achievement => `
                    <div class="weekly-achievement-badge">
                        <span class="weekly-achievement-icon">${achievement.icon}</span>
                        <span class="weekly-achievement-name">${achievement.name}</span>
                    </div>
                `).join('');
            }
        }

        // 打开全部成就模态框
        function openAllAchievementsModal() {
            const modal = document.getElementById('allAchievementsModal');
            const grid = document.getElementById('allAchievementsGrid');
            
            // 渲染所有成就
            grid.innerHTML = achievements.map(achievement => {
                const lockedClass = achievement.unlocked ? 'unlocked' : 'locked';
                const progress = getAchievementProgress(achievement);
                const progressText = achievement.unlocked 
                    ? `共获得 ${achievement.count || 0} 次` 
                    : `进度: ${progress}/${achievement.requirement}`;
                const statusText = achievement.unlocked ? '✓ 已解锁' : '🔒 未解锁';
                
                return `
                    <div class="achievement-card-full ${lockedClass}">
                        <div class="achievement-card-icon">${achievement.icon}</div>
                        <div class="achievement-card-name">${achievement.name}</div>
                        <div class="achievement-card-desc">获得方式: ${achievement.desc}</div>
                        <div class="achievement-card-progress">${progressText}</div>
                        <div class="achievement-card-status">${statusText}</div>
                    </div>
                `;
            }).join('');
            
            modal.classList.add('active');
        }

        // 关闭全部成就模态框
        function closeAllAchievementsModal() {
            const modal = document.getElementById('allAchievementsModal');
            modal.classList.remove('active');
        }

        // 获取成就进度
        function getAchievementProgress(achievement) {
            switch(achievement.type) {
                case 'total':
                    return Math.min(timerState.totalPomodoros, achievement.requirement);
                case 'daily':
                    return Math.min(timerState.todayPomodoros, achievement.requirement);
                case 'tasks':
                    return Math.min(achievementStats.completedTasks, achievement.requirement);
                case 'rest':
                    return Math.min(achievementStats.completedRestTasks, achievement.requirement);
                case 'time':
                    return Math.min(Math.floor(timerState.focusTimeSeconds / 60), achievement.requirement);
                case 'streak':
                    return Math.min(achievementStats.streakDays, achievement.requirement);
                case 'special':
                    return achievement.unlocked ? 1 : 0;
                case 'weekly':
                    return achievement.unlocked ? 1 : 0;
                default:
                    return 0;
            }
        }

        // 检查成就
        function checkAchievements() {
            let newUnlocks = [];
            
            // 检查周统计
            checkWeeklyStats();
            
            achievements.forEach(achievement => {
                let shouldUnlock = false;
                
                switch(achievement.type) {
                    case 'total':
                        shouldUnlock = timerState.totalPomodoros >= achievement.requirement;
                        break;
                    case 'daily':
                        shouldUnlock = timerState.todayPomodoros >= achievement.requirement;
                        break;
                    case 'tasks':
                        shouldUnlock = achievementStats.completedTasks >= achievement.requirement;
                        break;
                    case 'rest':
                        shouldUnlock = achievementStats.completedRestTasks >= achievement.requirement;
                        break;
                    case 'time':
                        const totalMinutes = Math.floor(timerState.focusTimeSeconds / 60);
                        shouldUnlock = totalMinutes >= achievement.requirement;
                        break;
                    case 'streak':
                        shouldUnlock = achievementStats.streakDays >= achievement.requirement;
                        break;
                    case 'special':
                        const now = new Date();
                        const hour = now.getHours();
                        if (achievement.id === 'early_bird') {
                            shouldUnlock = hour >= 6 && hour < 9;
                        } else if (achievement.id === 'night_owl') {
                            shouldUnlock = hour >= 22 && hour < 24;
                        }
                        break;
                    case 'weekly':
                        if (achievement.id === 'grand_slam') {
                            // 检查是否获得了所有其他成就
                            const unlockedAchievements = achievements.filter(a => 
                                a.type !== 'weekly' && a.unlocked
                            );
                            shouldUnlock = unlockedAchievements.length >= achievements.length - 1; // 减去大满贯本身
                        }
                        break;
                    default:
                        break;
                }
                
                if (shouldUnlock) {
                    // 检查是否已经在本周解锁过
                    const now = new Date();
                    const dayOfWeek = now.getDay() || 7;
                    const weekStart = new Date(now);
                    weekStart.setDate(now.getDate() - dayOfWeek + 1);
                    weekStart.setHours(0, 0, 0, 0);
                    
                    const achievementUnlockDate = achievement.unlockedDate ? new Date(achievement.unlockedDate) : null;
                    const isNewUnlock = !achievement.unlocked || (achievementUnlockDate && achievementUnlockDate < weekStart);
                    
                    if (isNewUnlock) {
                        achievement.unlocked = true;
                        achievement.unlockedDate = new Date().toISOString();
                        if (!achievement.count) {
                            achievement.count = 0;
                        }
                        achievement.count++;
                        newUnlocks.push(achievement);
                    }
                }
            });
            
            // 显示新解锁的成就
            newUnlocks.forEach((achievement, index) => {
                setTimeout(() => {
                    showAchievementNotification(achievement);
                }, index * 500);
            });
            
            if (newUnlocks.length > 0) {
                saveAchievements();
                renderAchievements();
                updateAchievementSummary();
            }
        }

                </div>
            `;
            
            document.body.appendChild(notification);

            setTimeout(() => {

            }, 5000);
        }

        // 渲染单个任务列表
        function renderTaskList(type, containerId) {
            const container = document.getElementById(containerId);
            const taskList = tasks[type];
            
            if (taskList.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">暂无任务，点击 + 添加新任务</div>';
                return;
            }
            
            container.innerHTML = taskList.map((task, index) => {
                const priorityText = task.priority === 'high' ? 'H' : task.priority === 'medium' ? 'M' : 'L';
                const priorityClass = `priority-${task.priority}`;
                const completedClass = task.completed ? 'completed' : '';
                const borderColors = ['#ff6b35', '#ff9a56', '#ffd700', '#ffed4e'];
                const borderColor = borderColors[index % borderColors.length];
                
                // 检查是否处于删除模式
                const isDeleteMode = deleteMode.active && deleteMode.type === type;
                const isSelected = deleteMode.selectedTasks.includes(task.id);
                const checkboxClass = isDeleteMode ? (isSelected ? 'checked' : '') : (task.completed ? 'checked' : '');
                const checkboxOnclick = isDeleteMode ? `selectTaskForDelete(${task.id}, '${type}')` : `toggleTaskById(${task.id}, '${type}')`;
                
                return `
                    <div class="task-item ${completedClass}" data-task-id="${task.id}" style="border-left-color: ${borderColor}" draggable="true" ondragstart="dragStart(event, ${task.id}, '${type}')" ondragover="dragOver(event)" ondrop="drop(event, ${task.id}, '${type}')" ${editMode.active && editMode.type === type ? 'onclick="openEditTaskModal(' + task.id + ', \'' + type + '\')"' : ''}>
                        <div class="task-checkbox ${checkboxClass}" onclick="${checkboxOnclick}"></div>

                            <div class="task-time">${task.desc || ''}</div>

                        <div class="task-priority ${priorityClass}">${priorityText}</div>

        // 选择要删除的任务
        function selectTaskForDelete(taskId, type) {
            const index = deleteMode.selectedTasks.indexOf(taskId);
            if (index > -1) {
                deleteMode.selectedTasks.splice(index, 1);
            } else {
                deleteMode.selectedTasks.push(taskId);
            }
            renderTasks();
        }

        // 确认删除任务
        function confirmDeleteTasks(type) {
            if (deleteMode.selectedTasks.length === 0) {
                toggleDeleteMode(type);
                return;
            }
            
            // 过滤掉要删除的任务
            tasks[type] = tasks[type].filter(task => !deleteMode.selectedTasks.includes(task.id));
            
            // 退出删除模式
            deleteMode.active = false;
            deleteMode.type = null;
            deleteMode.selectedTasks = [];
            
            saveTasks();
            updateDeleteModeUI();
            renderTasks();
        }

            document.getElementById('taskDesc').value = '';

        function openEditTaskModal(taskId, type) {
            const task = tasks[type].find(t => t.id === taskId);
            if (!task) return;
            
            document.getElementById('editTaskId').value = task.id;
            document.getElementById('editTaskType').value = type;

            document.getElementById('editTaskDesc').value = task.desc || '';

        // 编辑任务
        function editTask(event) {
            event.preventDefault();
            
            const taskId = parseInt(document.getElementById('editTaskId').value);
            const type = document.getElementById('editTaskType').value;
            const name = document.getElementById('editTaskName').value.trim();
            const desc = document.getElementById('editTaskDesc').value.trim();
            const priority = document.getElementById('editTaskPriority').value;
            
            if (!name) {
                alert('请输入任务名称');
                return;
            }
            
            const task = tasks[type].find(t => t.id === taskId);
            if (task) {
                task.name = name;
                task.desc = desc;
                task.priority = priority;
                
                sortTasks(type);
                saveTasks();
                renderTasks();
                closeEditTaskModal();
            }
        }

        // 拖拽相关变量
        let draggedTask = null;
        let draggedTaskType = null;

        // 开始拖拽
        function dragStart(event, taskId, type) {
            draggedTask = taskId;
            draggedTaskType = type;
            event.dataTransfer.effectAllowed = 'move';
        }

        // 拖拽经过
        function dragOver(event) {
            event.preventDefault();
            event.dataTransfer.dropEffect = 'move';
        }

        // 放置
        function drop(event, targetTaskId, type) {
            event.preventDefault();
            
            if (draggedTask === targetTaskId || draggedTaskType !== type) {
                return;
            }
            
            const taskList = tasks[type];
            const draggedIndex = taskList.findIndex(task => task.id === draggedTask);
            const targetIndex = taskList.findIndex(task => task.id === targetTaskId);
            
            if (draggedIndex !== -1 && targetIndex !== -1) {
                // 交换两个任务的sortOrder
                const draggedTaskObj = taskList[draggedIndex];
                const targetTaskObj = taskList[targetIndex];
                
                // 计算新的sortOrder值，确保插入到正确位置
                const newSortOrder = (draggedTaskObj.sortOrder + targetTaskObj.sortOrder) / 2;
                draggedTaskObj.sortOrder = newSortOrder;
                
                // 重新排序
                sortTasks(type);
                saveTasks();
                renderTasks();
            }
        }

        // 添加任务
        function addTask(event) {
            event.preventDefault();
            
            const name = document.getElementById('taskName').value.trim();
            const desc = document.getElementById('taskDesc').value.trim();
            const priority = document.getElementById('taskPriority').value;
            const type = document.getElementById('taskType').value;
            
            if (!name) {
                alert('请输入任务名称');
                return;
            }
            
            const newTask = {
                id: taskIdCounter++,
                name: name,
                desc: desc,
                priority: priority,
                completed: false,
                createdAt: new Date().toDateString(),
                sortOrder: Date.now() // 使用时间戳作为默认排序值
            };
            
            tasks[type].push(newTask);
            sortTasks(type);
            saveTasks();
            renderTasks();
            closeAddTaskModal();
            playSound('task');
        }

        // 切换任务完成状态
        function toggleTaskById(taskId, type) {
            const task = tasks[type].find(t => t.id === taskId);
            if (task) {
                const wasCompleted = task.completed;
                task.completed = !task.completed;
                
                // 统计完成的任务数
                if (!wasCompleted && task.completed) {
                    achievementStats.completedTasks++;
                    // 统计完成的休息任务数
                    if (type === 'break') {
                        achievementStats.completedRestTasks++;
                    }
                    saveAchievements();
                    checkAchievements();
                } else if (wasCompleted && !task.completed) {
                    achievementStats.completedTasks = Math.max(0, achievementStats.completedTasks - 1);
                    // 统计完成的休息任务数
                    if (type === 'break') {
                        achievementStats.completedRestTasks = Math.max(0, achievementStats.completedRestTasks - 1);
                    }
                    saveAchievements();
                }
                
                saveTasks();
                renderTasks();
                playSound('task');
            }
        }

        // 兼容旧的toggleTask函数
        function toggleTask(taskId) {
            // 查找任务在哪个列表
            let found = false;
            for (const type in tasks) {
                const task = tasks[type].find(t => t.id === taskId);
                if (task) {
                    toggleTaskById(taskId, type);
                    found = true;
                    break;
                }
            }
        }

        // 加载统计数据（从localStorage）
        function loadStats() {
            const saved = localStorage.getItem('pomodoroStats');
            if (saved) {
                const stats = JSON.parse(saved);
                const today = new Date().toDateString();
                
                if (stats.date === today) {
                    timerState.todayPomodoros = stats.todayPomodoros || 0;
                    timerState.focusTimeSeconds = stats.focusTimeSeconds || 0;
                }
                
                timerState.totalPomodoros = stats.totalPomodoros || 0;
            }
            updateStatsDisplay();
        }

        // 保存统计数据
        function saveStats() {
            const stats = {
                date: new Date().toDateString(),
                todayPomodoros: timerState.todayPomodoros,
                totalPomodoros: timerState.totalPomodoros,
                focusTimeSeconds: timerState.focusTimeSeconds
            };
            localStorage.setItem('pomodoroStats', JSON.stringify(stats));
        }

        // 切换计时器（开始/暂停）
        function toggleTimer() {
            if (!timerState.isRunning) {
                startTimer();
            } else {
                pauseTimer();
            }
        }

        // 开始计时器
        function startTimer() {
            timerState.isRunning = true;
            timerState.isPaused = false;
            
            const startBtn = document.getElementById('startBtn');
            startBtn.innerHTML = '⏸';
            startBtn.title = '暂停';
            
            document.getElementById('timeLabel').textContent = timerState.mode === 'focus' ? '专注中...' : '休息中...';
            
            // 播放提示音（可选）
            playSound('start');
            
            timerState.intervalId = setInterval(() => {
                timerState.timeLeft--;
                
                if (timerState.mode === 'focus') {
                    timerState.focusTimeSeconds++;
                }
                
                updateDisplay();
                updateProgressRing();
                
                // 计时结束
                if (timerState.timeLeft <= 0) {
                    timerComplete();
                }
            }, 1000);
        }

        // 暂停计时器
        function pauseTimer() {
            timerState.isRunning = false;
            timerState.isPaused = true;
            
            clearInterval(timerState.intervalId);
            
            const startBtn = document.getElementById('startBtn');
            startBtn.innerHTML = '▶';
            startBtn.title = '继续';
            
            document.getElementById('timeLabel').textContent = '已暂停';
            playSound('pause');
        }

        // 重置计时器
        function resetTimer() {
            clearInterval(timerState.intervalId);
            
            timerState.isRunning = false;
            timerState.isPaused = false;
            timerState.mode = 'focus';
            timerState.timeLeft = CONFIG.focusTime;
            timerState.totalTime = CONFIG.focusTime;
            
            const startBtn = document.getElementById('startBtn');
            startBtn.innerHTML = '▶';
            startBtn.title = '开始';
            
            document.getElementById('timeLabel').textContent = '准备开始';
            
            updateDisplay();
            updateProgressRing();
            playSound('reset');
        }

        // 跳过当前计时器
        function skipTimer() {
            if (confirm('确定要跳过当前' + (timerState.mode === 'focus' ? '专注' : '休息') + '时间吗？')) {
                timerComplete();
            }
        }

        // 计时完成
        function timerComplete() {
            clearInterval(timerState.intervalId);
            timerState.isRunning = false;
            
            playSound('complete');
            
            if (timerState.mode === 'focus') {
                // 完成一个番茄钟
                timerState.todayPomodoros++;
                timerState.totalPomodoros++;
                timerState.pomodoroCount++;
                achievementStats.totalPomodoros = timerState.totalPomodoros;
                
                saveStats();
                updateStatsDisplay();
                
                // 检查成就
                checkAchievements();
                
                // 检查是否需要大休息
                if (timerState.pomodoroCount % 4 === 0) {
                    // 每4个番茄钟触发大休息
                    showNotification('🎉 专注时间完成！', '恭喜完成4个番茄钟，享受20分钟的大休息吧！');
                    timerState.mode = 'break';
                    timerState.timeLeft = 20 * 60; // 20分钟大休息
                    timerState.totalTime = 20 * 60;
                    document.getElementById('timeLabel').textContent = '大休息时间';
                } else {
                    // 常规短休息
                    showNotification('🎉 专注时间完成！', '休息一下吧，放松5分钟。');
                    timerState.mode = 'break';
                    timerState.timeLeft = CONFIG.breakTime;
                    timerState.totalTime = CONFIG.breakTime;
                    document.getElementById('timeLabel').textContent = '休息时间';
                }
            } else {
                // 休息完成
                showNotification('⏰ 休息结束！', '准备开始下一个番茄钟吧！');
                
                // 切换回专注模式
                timerState.mode = 'focus';
                timerState.timeLeft = CONFIG.focusTime;
                timerState.totalTime = CONFIG.focusTime;
                document.getElementById('timeLabel').textContent = '准备开始';
            }
            
            const startBtn = document.getElementById('startBtn');
            startBtn.innerHTML = '▶';
            startBtn.title = '开始';
            
            updateDisplay();
            updateProgressRing();
        }

        // 更新显示
        function updateDisplay() {
            const minutes = Math.floor(timerState.timeLeft / 60);
            const seconds = timerState.timeLeft % 60;
            const timeString = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            document.getElementById('timeDisplay').textContent = timeString;
            document.title = `${timeString} - 番茄钟`;
        }

        // 更新进度环
        function updateProgressRing() {
            const progressRing = document.getElementById('progressRing');
            const circumference = 2 * Math.PI * 150; // 2πr
            const progress = 1 - (timerState.timeLeft / timerState.totalTime);
            const offset = circumference * (1 - progress);
            
            progressRing.style.strokeDashoffset = offset;
        }

        // 更新统计显示
        function updateStatsDisplay() {
            document.getElementById('todayPomodoros').textContent = timerState.todayPomodoros;
            document.getElementById('totalPomodoros').textContent = timerState.totalPomodoros;
            
            const hours = Math.floor(timerState.focusTimeSeconds / 3600);
            const minutes = Math.floor((timerState.focusTimeSeconds % 3600) / 60);
            document.getElementById('focusTime').textContent = `${hours}:${minutes.toString().padStart(2, '0')}`;
            
            saveStats();
        }

        // 任务切换
        function toggleTask(taskId) {
            const taskItem = document.querySelector(`[data-task-id="${taskId}"]`);
            const checkbox = taskItem.querySelector('.task-checkbox');
            
            if (checkbox.classList.contains('checked')) {
                checkbox.classList.remove('checked');
                taskItem.classList.remove('completed');
            } else {
                checkbox.classList.add('checked');
                taskItem.classList.add('completed');
                playSound('task');
            }
        }

        // 显示通知
        function showNotification(title, message) {
            // 浏览器通知
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification(title, {
                    body: message,
                    icon: '🍅'
                });
            } else if ('Notification' in window && Notification.permission !== 'denied') {
                Notification.requestPermission().then(permission => {
                    if (permission === 'granted') {
                        new Notification(title, {
                            body: message,
                            icon: '🍅'
                        });
                    }
                });
            }
            
            // 页面内提示
            alert(title + '\n' + message);
        }

        // 播放提示音（简单的蜂鸣声）
        function playSound(type) {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                let frequency = 440;
                let duration = 0.1;
                
                switch(type) {
                    case 'start':
                        frequency = 523.25; // C5
                        break;
                    case 'pause':
                        frequency = 392.00; // G4
                        break;
                    case 'complete':
                        frequency = 659.25; // E5
                        duration = 0.3;
                        break;
                    case 'task':
                        frequency = 523.25; // C5
                        duration = 0.05;
                        break;
                    case 'reset':
                        frequency = 349.23; // F4
                        break;
                }
                
                oscillator.frequency.value = frequency;
                oscillator.type = 'sine';
                
                gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + duration);
            } catch (e) {
                console.error('Audio not supported', e);
            }
        }

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                e.preventDefault();
                toggleTimer();
            } else if (e.code === 'KeyR' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                e.preventDefault();
                resetTimer();
            } else if (e.code === 'Escape') {
                closeAddTaskModal();
            }
        });

        // 点击模态框外部关闭
        document.getElementById('addTaskModal').addEventListener('click', (e) => {
            if (e.target.id === 'addTaskModal') {
                closeAddTaskModal();
            }
        });
        
        document.getElementById('allAchievementsModal').addEventListener('click', (e) => {
            if (e.target.id === 'allAchievementsModal') {
                closeAllAchievementsModal();
            }
        });

        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', init);

        // 定期保存统计数据
        setInterval(() => {
            if (timerState.isRunning) {
                saveStats();
            }
        }, 30000); // 每30秒保存一次
    </script>
</body>
</html>
